<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="title desc">
  <title id="title">font  type in motion</title>
  <desc id="desc">Animated wordmark for the font repository in GitHub light mode</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#f6f8fa"/>
      <stop offset="100%" stop-color="#eef2f6"/>
    </linearGradient>
    <linearGradient id="inkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0969da">
        <animate attributeName="stop-color" values="#0969da;#0550ae;#0969da" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#1f2328">
        <animate attributeName="stop-color" values="#1f2328;#424a53;#1f2328" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#1a7f37">
        <animate attributeName="stop-color" values="#1a7f37;#116329;#1a7f37" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="45%">
      <stop offset="0%" stop-color="#0969da" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="#0969da" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Atmosphere -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glow)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Paper texture hint via subtle diagonal -->
  <g stroke="#d0d7de" stroke-width="1" opacity="0.45">
    <line x1="0" y1="120" x2="200" y2="0"/>
    <line x1="0" y1="280" x2="360" y2="0"/>
    <line x1="840" y1="630" x2="1200" y2="390"/>
    <line x1="1000" y1="630" x2="1200" y2="510"/>
  </g>

  <!-- Baseline grid -->
  <g stroke="#d0d7de" stroke-width="1" opacity="0.9">
    <line x1="80" y1="210" x2="1120" y2="210"/>
    <line x1="80" y1="315" x2="1120" y2="315"/>
    <line x1="80" y1="420" x2="1120" y2="420"/>
    <line x1="80" y1="210" x2="80" y2="420" stroke-dasharray="4 8"/>
    <line x1="1120" y1="210" x2="1120" y2="420" stroke-dasharray="4 8"/>
  </g>
  <g fill="#656d76" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11">
    <text x="90" y="202">cap height</text>
    <text x="90" y="307">x-height</text>
    <text x="90" y="412">baseline</text>
  </g>

  <!-- Floating specimen glyphs -->
  <g fill="#d0d7de" font-family="Georgia, 'Times New Roman', serif" font-size="120" opacity="0.95">
    <text x="140" y="160">A
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-10; 0,0" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0.7;0.45" dur="7s" repeatCount="indefinite"/>
    </text>
    <text x="980" y="170">g
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,12; 0,0" dur="8s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.65;0.4" dur="8s" begin="0.5s" repeatCount="indefinite"/>
    </text>
    <text x="1040" y="520" font-size="90">Q
      <animateTransform attributeName="transform" type="translate" values="0,0; -8,0; 0,0" dur="9s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0.6;0.35" dur="9s" begin="1s" repeatCount="indefinite"/>
    </text>
    <text x="90" y="540" font-size="100">&amp;
      <animateTransform attributeName="transform" type="translate" values="0,0; 6,-6; 0,0" dur="6.5s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.38;0.62;0.38" dur="6.5s" begin="0.8s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Wordmark: FONT  stroke draw then fill -->
  <g font-family="Georgia, 'Times New Roman', serif" font-size="168" font-weight="700" letter-spacing="18" text-anchor="middle">
    <!-- Stroke draw -->
    <text x="600" y="360" fill="none" stroke="url(#inkGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"
          stroke-dasharray="900" stroke-dashoffset="900">
      FONT
      <animate attributeName="stroke-dashoffset" from="900" to="0" dur="2.2s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1"/>
      <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.75;1" dur="3.2s" fill="freeze"/>
    </text>
    <!-- Solid fill reveal -->
    <text x="600" y="360" fill="url(#inkGrad)" opacity="0">
      FONT
      <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.9s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="0,8; 0,0" begin="1.8s" dur="0.9s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/>
    </text>
  </g>

  <!-- Cursor blink after wordmark -->
  <rect x="860" y="248" width="4" height="120" fill="#0969da" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.55;0.56;0.72;0.73;1" dur="3.5s" begin="2.4s" repeatCount="indefinite"/>
  </rect>

  <!-- Tagline -->
  <text x="600" y="470" text-anchor="middle" fill="#656d76" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" letter-spacing="6" opacity="0">
    TYPE · RHYTHM · FORM
    <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.8s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0,12; 0,0" begin="2.6s" dur="0.8s" fill="freeze"/>
  </text>

  <!-- Accent measure bar -->
  <g opacity="0">
    <rect x="480" y="500" width="240" height="2" fill="#d0d7de" rx="1"/>
    <rect x="480" y="500" width="0" height="2" fill="#0969da" rx="1">
      <animate attributeName="width" from="0" to="240" begin="3s" dur="1.2s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1"/>
    </rect>
    <animate attributeName="opacity" from="0" to="1" begin="3s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Soft vignette -->
  <rect width="1200" height="630" fill="none" stroke="#ffffff" stroke-width="60" opacity="0.5"/>
</svg>
